name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run black --check .

      - name: Type check
        run: uv run mypy src

      - name: Test
        run: uv run pytest
