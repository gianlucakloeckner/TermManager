name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install
        run: uv sync --frozen --extra dev

      - name: Build app
        run: uv run pyinstaller --name TerminologyManager --windowed --onefile src/terminology_manager/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TerminologyManager-${{ runner.os }}-nightly
          path: dist/*
